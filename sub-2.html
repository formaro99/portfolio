<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>HPIX</title>

    <link rel="stylesheet" href="css/style.css">

    <style>
        @keyframes view_on {
            0% {
                background: rgba(0, 0, 0, 0.5);
            }

            50% {
                background: #FA5C39;
            }

            100% {
                background: rgba(0, 0, 0, 0.5);
            }
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            margin: 0;
            padding: 0;
            overflow-x: hidden;
            background: #090909;
            min-width: 320px;
        }

        #wrap {
            width: 70%;
            margin: 0 auto;
        }

        img {
            display: block;
            width: 100%;
        }

        .btn {
            position: fixed;
            right: 10.5%;
            bottom: 0;
            transform: translateX(60px);
        }

        .btn a {
            text-decoration: none;
            color: #fff;
            display: block;
            width: 100px;
            height: 100px;
            line-height: 100px;
            text-align: center;
        }

        .btn a.view {
            background: rgba(0, 0, 0, 0.5);
            font-size: 15px;
            animation: view_on 3s infinite;
        }

        .btn a.gotop {
            background: rgba(0, 0, 0, 1);
            font-size: 20px;
            font-weight: 800;
        }
    </style>
</head>

<body>
    <a name="top"></a>
    <div id="wrap">
        <div class="btn"><a
                href="https://www.figma.com/proto/BEpyuxqVVDqjcjICRxHPfR/%ED%99%8D%EB%A7%88%EB%A1%9C-PORTFOLIO?page-id=0%3A1&node-id=1-9658&viewport=-72%2C4531%2C0.24&t=eG6vlWzqdVXbkBwJ-1&scaling=min-zoom&content-scaling=fixed&starting-point-node-id=69%3A5748"
                class="view">프로토타입</a><a href="#top" class="gotop">↑</a></div>
        <img src="images/hpix_01.jpg" alt="#">
        <img src="images/hpix_02.jpg" alt="#">
        <img src="images/hpix_03.jpg" alt="#">
        <img src="images/hpix_04.jpg" alt="#">
        <img src="images/hpix_05.jpg" alt="#">
        <img src="images/hpix_06.jpg" alt="#">
        <img src="images/hpix_07.jpg" alt="#">
    </div>
</body>

</html>
